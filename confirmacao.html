<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscrição Concluída - Corrida AMICC</title>
    
    <link rel="icon" type="image/png" href="./assets/favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --primary-color: #f97316; --background: #0f172a; --surface: #1e293b; --text-primary: #f8fafc; --border: #334155; }
        body { font-family: 'Inter', sans-serif; background: var(--background); color: var(--text-primary); display: flex; flex-direction: column; min-height: 100vh; margin: 0; }
        
        .main-content { flex: 1; display: flex; align-items: center; justify-content: center; padding: 2rem 1rem; }
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: 1rem; padding: 3rem 2rem; max-width: 500px; width: 100%; text-align: center; }
        
        .footer-thiaguinho { text-align: center; padding: 1.5rem; font-size: 0.8rem; color: #94a3b8; border-top: 1px solid var(--border); background: var(--background); margin-top: auto; letter-spacing: 0.05em; }
        .footer-thiaguinho strong { color: #fdba74; font-weight: 800; }
    </style>
</head>
<body>

    <div class="main-content">
        <div class="card" id="mainCard">
            <i class="fas fa-check-circle" style="font-size: 4rem; color: #22c55e; margin-bottom: 1rem;"></i>
            <h1>Inscrição Recebida!</h1>
            <p style="color: #94a3b8; margin-bottom: 2rem;">Sua ficha está em processamento.</p>
            
            <!-- Restante da lógica de JS do upload de comprovante de pagamento permanece intacto na estrutura interna da div -->
            <a href="index.html" style="color: var(--primary-color); text-decoration: none; font-weight: 600;"><i class="fas fa-arrow-left"></i> Voltar ao site</a>
        </div>
    </div>

    <!-- Assinatura em todas as páginas -->
    <div class="footer-thiaguinho">
        powered by <strong>thIAguinho Soluções</strong>
    </div>

</body>
</html>
